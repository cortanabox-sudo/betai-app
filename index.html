<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Секретный Анализ Ставок</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; }
.app { padding: 20px 16px 30px; max-width: 480px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.logo { font-size: 19px; font-weight: 700; color: #4ade80; }
.lang-btn { background: #1e2530; border: 1px solid #2d3748; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.sport-input { width: 100%; background: #1e2530; border: 1px solid #2d3748; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 15px; margin-bottom: 14px; outline: none; }
.upload-zone { width: 100%; background: #161b27; border: 2px dashed #2d3748; border-radius: 12px; padding: 24px 20px; text-align: center; cursor: pointer; margin-bottom: 8px; transition: border-color 0.2s; }
.upload-zone:hover { border-color: #4ade80; }
.upload-zone.has-image { padding: 0; border: 2px solid #4ade80; overflow: hidden; }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-text { color: #94a3b8; font-size: 14px; }
.paste-hint { color: #64748b; font-size: 12px; text-align: center; margin-bottom: 14px; }
#preview { width: 100%; border-radius: 10px; display: none; }
#file-input { display: none; }
.btn-analyze { width: 100%; background: #4ade80; color: #0a0f1a; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
.btn-analyze:hover { background: #22c55e; }
.btn-analyze:disabled { background: #2d3748; color: #64748b; cursor: not-allowed; }
.btn-retry { width: 100%; background: #1e2530; color: #94a3b8; border: 1px solid #2d3748; border-radius: 12px; padding: 13px; font-size: 15px; cursor: pointer; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-retry:hover { background: #253040; }
.loading { display: none; text-align: center; padding: 24px; color: #4ade80; font-size: 15px; }
.loading-dots::after { content: ''; animation: dots 1.2s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:'.'} }

/* RESULT CARDS */
.result-section { display: none; margin-bottom: 14px; }
.top-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.top-card { background: #161b27; border: 1px solid #2d3748; border-radius: 12px; padding: 14px 16px; }
.top-card-label { color: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.top-card-value { color: #fff; font-size: 22px; font-weight: 700; }
.top-card-value.green { color: #4ade80; }
.top-card-signal { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.3; }

.bars-card { background: #161b27; border: 1px solid #2d3748; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.bars-label { color: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.bar-row { margin-bottom: 12px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.bar-name { color: #cbd5e1; font-size: 13px; }
.bar-pct { color: #fff; font-size: 13px; font-weight: 600; }
.bar-track { background: #1e2530; border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; background: #4ade80; border-radius: 4px; transition: width 0.8s ease; }

.analytics-card { background: #161b27; border: 1px solid #2d3748; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.analytics-label { color: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.analytics-text { color: #94a3b8; font-size: 13px; line-height: 1.7; }
.analytics-text b { color: #fff; }

.attempts-box { background: #161b27; border-left: 3px solid #4ade80; border-radius: 8px; padding: 14px 16px; color: #94a3b8; font-size: 14px; margin-bottom: 20px; text-align: center; }
.attempts-box span { color: #fff; font-weight: 700; }
.footer { text-align: center; color: #334155; font-size: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">💡 AI Секретный Анализ Ставок</div>
    <button class="lang-btn">🇷🇺 RU</button>
  </div>

  <input type="text" class="sport-input" placeholder="Футбол" id="sport-input" value="Футбол" />

  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div id="upload-placeholder">
      <div class="upload-icon">📷</div>
      <div class="upload-text">Загрузите изображение события</div>
    </div>
    <img id="preview" />
  </div>
  <input type="file" id="file-input" accept="image/*" />
  <div class="paste-hint">Или просто вставьте скриншот (Ctrl + V)</div>

  <div class="loading" id="loading">
    <span class="loading-dots">🔍 Анализирую коэффициенты</span>
  </div>

  <!-- РЕЗУЛЬТАТ -->
  <div class="result-section" id="result-section">
    <div class="top-cards">
      <div class="top-card">
        <div class="top-card-label">Уверенность AI</div>
        <div class="top-card-value green" id="confidence">—</div>
      </div>
      <div class="top-card">
        <div class="top-card-label">Надёжный сигнал</div>
        <div class="top-card-signal" id="best-signal">—</div>
      </div>
    </div>

    <div class="bars-card">
      <div class="bars-label">% событий</div>
      <div id="bars-container"></div>
    </div>

    <div class="analytics-card">
      <div class="analytics-label">AI Аналитика</div>
      <div class="analytics-text" id="analytics-text">—</div>
    </div>
  </div>

  <button class="btn-analyze" id="btn-analyze" onclick="analyze()">
    🔍 Проанализировать ставку
  </button>
  <button class="btn-retry" onclick="reset()">
    🔄 Попробовать другое изображение
  </button>

  <div class="attempts-box">
    Осталось попыток на сегодня: <span id="attempts">10</span> из <span>10</span>
  </div>
  <div class="footer">Создано нейросетью BetAI · © 2025</div>
</div>

<script>
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

let attempts = 10;
let imageBase64 = null;
let imageMime = 'image/jpeg';

const uploadZone = document.getElementById('upload-zone');
const preview = document.getElementById('preview');
const placeholder = document.getElementById('upload-placeholder');
const fileInput = document.getElementById('file-input');
const btnAnalyze = document.getElementById('btn-analyze');
const loading = document.getElementById('loading');
const resultSection = document.getElementById('result-section');
const attemptsEl = document.getElementById('attempts');

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
document.addEventListener('paste', e => {
  for (let item of e.clipboardData.items)
    if (item.type.startsWith('image/')) { loadImage(item.getAsFile()); break; }
});
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor='#4ade80'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor='#2d3748'; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});

function loadImage(file) {
  imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    const data = ev.target.result;
    imageBase64 = data.split(',')[1];
    preview.src = data;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    uploadZone.classList.add('has-image');
    resultSection.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyze() {
  if (!imageBase64) { alert('Сначала загрузите изображение!'); return; }
  if (attempts <= 0) { alert('Попытки на сегодня закончились!'); return; }

  btnAnalyze.disabled = true;
  loading.style.display = 'block';
  resultSection.style.display = 'none';

  const sport = document.getElementById('sport-input').value || 'Спорт';

  const prompt = `Ты эксперт по анализу спортивных ставок. Посмотри на это фото с коэффициентами букмекера (${sport}).

Твоя задача:
1. Найди все коэффициенты на фото
2. Рассчитай вероятность каждого исхода по формуле: вероятность = 1 / коэффициент * 100%
3. Выбери 3-5 наиболее вероятных исходов (вероятность 50-85%)
4. Определи лучший сигнал (самый надёжный исход)
5. Напиши короткую аналитику почему этот исход наиболее вероятен, включая названия команд

Ответь ТОЛЬКО в формате JSON (без markdown, без пояснений):
{
  "confidence": 75,
  "best_signal": "Название исхода",
  "outcomes": [
    {"name": "Название исхода", "probability": 75},
    {"name": "Название исхода", "probability": 63},
    {"name": "Название исхода", "probability": 57}
  ],
  "analytics": "Короткая аналитика на русском языке. <b>Причина:</b> объяснение."
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await resp.json();
    let text = data.content?.[0]?.text || '{}';
    text = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(text);
    showResult(result);
    attempts--;
    attemptsEl.textContent = attempts;
  } catch(e) {
    alert('Ошибка при анализе. Попробуйте ещё раз.');
  }

  loading.style.display = 'none';
  btnAnalyze.disabled = false;
}

function showResult(r) {
  document.getElementById('confidence').textContent = (r.confidence || 0) + '%';
  document.getElementById('best-signal').textContent = r.best_signal || '—';
  document.getElementById('analytics-text').innerHTML = r.analytics || '—';

  const container = document.getElementById('bars-container');
  container.innerHTML = '';
  (r.outcomes || []).forEach(o => {
    const pct = Math.min(Math.max(o.probability, 0), 100);
    container.innerHTML += `
      <div class="bar-row">
        <div class="bar-meta">
          <span class="bar-name">${o.name}</span>
          <span class="bar-pct">${pct}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:0%" data-target="${pct}%"></div>
        </div>
      </div>`;
  });

  resultSection.style.display = 'block';

  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(b => {
      b.style.width = b.dataset.target;
    });
  }, 100);
}

function reset() {
  imageBase64 = null;
  preview.style.display = 'none';
  preview.src = '';
  placeholder.style.display = 'block';
  uploadZone.classList.remove('has-image');
  resultSection.style.display = 'none';
  fileInput.value = '';
}
</script>
</body>
</html>
